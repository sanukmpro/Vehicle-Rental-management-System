<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Driver | Admin</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Helvetica Neue", Arial, sans-serif;
}

body {
    background: #ffffff;
    color: #111;
}

/* NAVBAR */
nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 22px 60px;
    border-bottom: 1px solid #eee;
}

.logo {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 1px;
}

.admin-badge {
    font-size: 12px;
    background: #111;
    color: #fff;
    padding: 4px 12px;
}

/* SECTION */
.container {
    min-height: 90vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.form-box {
    width: 450px;
}

.form-box h1 {
    font-size: 40px;
    font-weight: 500;
    margin-bottom: 10px;
}

.form-box p {
    font-size: 14px;
    color: #666;
    margin-bottom: 40px;
}

/* FORM */

form {
    display: flex;
    flex-direction: column;
}

input, select {
    padding: 16px;
    margin-bottom: 20px;
    border: 1px solid #ddd;
    font-size: 14px;
    outline: none;
    transition: border 0.3s ease;
}

input:focus, select:focus {
    border: 1px solid #000;
}

button {
    padding: 16px;
    background: #111;
    color: #fff;
    border: none;
    font-size: 14px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: background 0.3s ease;
}

button:hover {
    background: #333;
}
</style>
</head>

<body>

<nav>
    <div class="logo">VEHICLE RENTAL</div>
    <a href="{% url 'admin_dashboard' %}" style="text-decoration:none; color:inherit; display:inline-block;">
        <div class="admin-badge">ADMIN PANEL</div>
    </a>
</nav>

<section class="container">

<div class="form-box">

<h1>Edit Driver</h1>
<p>Update driver information.</p>

<form action="/update_driver/1" method="POST">

<input type="text" name="name" value="John Doe" placeholder="Driver Name" required>

<input type="text" name="license" value="KL123456" placeholder="License Number" required>

<input type="text" name="phone" value="9876543210" placeholder="Contact Number" required>

<input type="email" name="email" value="john@email.com" placeholder="Driver Email" required>

<select name="status">
<option value="available" selected>Available</option>
<option value="assigned">Assigned</option>
<option value="inactive">Inactive</option>
</select>

<button type="submit">SAVE CHANGES</button>

</form>

</div>

</section>

</body>
</html>
