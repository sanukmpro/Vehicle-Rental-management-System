<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Drivers | Admin</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Helvetica Neue",Arial,sans-serif;
}

body{
background:#fff;
color:#111;
}

/* NAVBAR */
nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:22px 60px;
border-bottom:1px solid #eee;
}

.logo{
font-size:20px;
font-weight:600;
letter-spacing:1px;
}

.admin-badge{
font-size:12px;
background:#111;
color:#fff;
padding:4px 12px;
}

/* PAGE */
.container{
padding:60px;
}

h1{
font-size:40px;
font-weight:500;
margin-bottom:40px;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:18px;
border-bottom:1px solid #eee;
text-align:left;
font-size:14px;
}

tr:hover{
background:#fafafa;
}

/* ACTION BUTTONS */

.action{
display:flex;
gap:10px;
}

.btn{
padding:8px 14px;
border:1px solid #111;
background:#fff;
cursor:pointer;
font-size:12px;
}

.btn:hover{
background:#111;
color:#fff;
}

.delete{
border:1px solid #d33;
color:#d33;
}

.delete:hover{
background:#d33;
color:#fff;
}

.add-btn{
margin-bottom:25px;
display:inline-block;
padding:12px 20px;
background:#111;
color:#fff;
text-decoration:none;
font-size:13px;
}

.add-btn:hover{
background:#333;
}
</style>
</head>

<body>

<nav>
<div class="logo">VEHICLE RENTAL</div>
<a href="{% url 'admin_dashboard' %}" style="text-decoration:none; color:inherit; display:inline-block;">
    <div class="admin-badge">ADMIN PANEL</div>
</a>
</nav>

<section class="container">

<h1>Manage Drivers</h1>

<a href="/add_driver/" class="add-btn">ADD NEW DRIVER</a>

<table>

<thead>
<tr>
<th>Name</th>
<th>License</th>
<th>Phone</th>
<th>Email</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody>

{% for driver in drivers %}

<tr>
<td>{{ driver.name }}</td>
<td>{{ driver.license_number }}</td>
<td>{{ driver.phone }}</td>
<td>{{ driver.email }}</td>
<td>{{ driver.status }}</td>

<td class="action">

<a href="/manage_drivers_edit/{{ driver.id }}/">
<button class="btn">Edit</button>
</a>

<form action="/delete_driver/" method="POST">
<input type="hidden" name="id" value="{{ driver.id }}">
<button class="btn delete">Delete</button>
</form>

</td>
</tr>

{% empty %}

<tr>
<td colspan="6" style="text-align:center;">No drivers found</td>
</tr>

{% endfor %}

</tbody>

</table>
</section>

</body>
</html>
