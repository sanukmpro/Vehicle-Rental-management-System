<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Vehicle | Admin</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Helvetica Neue", Arial, sans-serif;
}

body {
    background: #ffffff;
    color: #111;
}

/* NAVBAR */
nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 22px 60px;
    border-bottom: 1px solid #eee;
}

.logo {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 1px;
}

.admin-badge {
    font-size: 12px;
    background: #111;
    color: #fff;
    padding: 4px 12px;
}

/* SECTION */
.container {
    min-height: 90vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.form-box {
    width: 450px;
}

.form-box h1 {
    font-size: 40px;
    font-weight: 500;
    margin-bottom: 10px;
}

.form-box p {
    font-size: 14px;
    color: #666;
    margin-bottom: 40px;
}

/* FORM */
form {
    display: flex;
    flex-direction: column;
}

input, select {
    padding: 16px;
    margin-bottom: 20px;
    border: 1px solid #ddd;
    font-size: 14px;
    outline: none;
    transition: border 0.3s ease;
}

input:focus, select:focus {
    border: 1px solid #000;
}

button {
    padding: 16px;
    background: #111;
    color: #fff;
    border: none;
    font-size: 14px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: background 0.3s ease;
}

button:hover {
    background: #333;
}
</style>
</head>

<body>

<nav>
    <div class="logo">VEHICLE RENTAL</div>
    <a href="{% url 'admin_dashboard' %}" style="text-decoration:none; color:inherit; display:inline-block;">
        <div class="admin-badge">ADMIN PANEL</div>
    </a>
</nav>

<section class="container">

<div class="form-box">

<h1>Edit Vehicle</h1>
<p>Update vehicle information.</p>

<form action="/update_vehicle/" method="POST" enctype="multipart/form-data">
{% csrf_token %}

<input type="hidden" name="id" value="{{ vehicle.id }}">

<input type="text" name="vehicle_name" value="{{ vehicle.vehicle_name }}" placeholder="Vehicle Name" required>

<input type="text" name="vehicle_number" value="{{ vehicle.vehicle_number }}" placeholder="Vehicle Number" required>

<input type="text" name="brand" value="{{ vehicle.brand }}" placeholder="Vehicle Brand" required>

<input type="number" name="rent_price" value="{{ vehicle.rent_price }}" placeholder="Rental Price Per Day" required>

<select name="fuel_type">
    <option value="Petrol" {% if vehicle.fuel_type == "Petrol" %}selected{% endif %}>Petrol</option>
    <option value="Diesel" {% if vehicle.fuel_type == "Diesel" %}selected{% endif %}>Diesel</option>
    <option value="Electric" {% if vehicle.fuel_type == "Electric" %}selected{% endif %}>Electric</option>
</select>

<select name="vehicle_type">
    <option value="2W" {% if vehicle.vehicle_type == "2W" %}selected{% endif %}>Two Wheeler</option>
    <option value="3W" {% if vehicle.vehicle_type == "3W" %}selected{% endif %}>Three Wheeler</option>
    <option value="4W" {% if vehicle.vehicle_type == "4W" %}selected{% endif %}>Four Wheeler</option>
    <option value="HV" {% if vehicle.vehicle_type == "HV" %}selected{% endif %}>Heavy Vehicle</option>
</select>
<select name="status">
    <option value="Available" {% if vehicle.status == "Available" %}selected{% endif %}>Available</option>
    <option value="Rented" {% if vehicle.status == "Rented" %}selected{% endif %}>Rented</option>
    <option value="Maintenance" {% if vehicle.status == "Maintenance" %}selected{% endif %}>Maintenance</option>
</select>
<!-- Current Image Preview -->
{% if vehicle.vehicle_image %}
<img src="{{ vehicle.vehicle_image.url }}" 
     style="width:100%; height:200px; object-fit:cover; margin-bottom:15px; border:1px solid #ddd;">
{% endif %}

<!-- Upload New Image -->
<input type="file" name="vehicle_image" accept="image/*">

<button type="submit">SAVE CHANGES</button>

</form>

</div>

</section>

</body>
</html>
