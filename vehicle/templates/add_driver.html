<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Driver | Admin</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Helvetica Neue", Arial, sans-serif;
}

body {
    background: #ffffff;
    color: #111;
}

/* NAVBAR */
nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 22px 60px;
    border-bottom: 1px solid #eee;
}

.logo {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 1px;
}

.admin-badge {
    font-size: 12px;
    background: #111;
    color: #fff;
    padding: 4px 12px;
    letter-spacing: 1px;
}

/* SECTION */
.container {
    min-height: 90vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.form-box {
    width: 450px;
}

.form-box h1 {
    font-size: 40px;
    font-weight: 500;
    margin-bottom: 10px;
}

.form-box p {
    font-size: 14px;
    color: #666;
    margin-bottom: 40px;
}

/* FORM */
form {
    display: flex;
    flex-direction: column;
}

input, select {
    padding: 16px;
    margin-bottom: 20px;
    border: 1px solid #ddd;
    font-size: 14px;
    outline: none;
    transition: border 0.3s ease;
}

input:focus, select:focus {
    border: 1px solid #000;
}

input[type="file"]{
    padding:10px;
    background:#fafafa;
}

#preview{
    width:100%;
    height:200px;
    object-fit:cover;
    border:1px solid #ddd;
    margin-bottom:20px;
    display:none;
}

button {
    padding: 16px;
    background: #111;
    color: #fff;
    border: none;
    font-size: 14px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: background 0.3s ease;
}

button:hover {
    background: #333;
}

.success {
    display: none;
    color: green;
    font-size: 13px;
    margin-bottom: 15px;
}

.error {
    display: none;
    color: red;
    font-size: 13px;
    margin-bottom: 15px;
}
</style>
</head>

<body>

<nav>
    <div class="logo">VEHICLE RENTAL</div>
    <a href="{% url 'admin_dashboard' %}" style="text-decoration:none; color:inherit; display:inline-block;">
        <div class="admin-badge">ADMIN PANEL</div>
    </a>
</nav>

<section class="container">
<div class="form-box">

<h1>Add Driver</h1>
<p>Register a new driver into the system.</p>

<form id="driverForm" enctype="multipart/form-data">

<label class="success" id="successMsg">Driver added successfully.</label>
<label class="error" id="errorMsg">Something went wrong.</label>

<input type="text" id="name" placeholder="Driver Full Name" required>

<input type="text" id="license" placeholder="License Number" required>

<input type="text" id="phone" placeholder="Contact Number" required>

<input type="email" id="email" placeholder="Driver Email" required>
<label>Vehicle Categories</label>

<select id="vehicle_type" multiple>
    <option value="2W">Two Wheeler</option>
    <option value="3W">Three Wheeler</option>
    <option value="4W">Four Wheeler</option>
    <option value="HV">Heavy Vehicle</option>
</select>
<label>Driver Photo</label>

<img id="preview">

<input type="file" id="photo" accept="image/*">

<select id="status">
<option value="available">Available</option>
<option value="assigned">Assigned</option>
<option value="inactive">Inactive</option>
</select>

<button type="submit">ADD DRIVER</button>

</form>

</div>
</section>

<script>

const form = document.getElementById("driverForm");
const successMsg = document.getElementById("successMsg");
const errorMsg = document.getElementById("errorMsg");
const photo = document.getElementById("photo");
const preview = document.getElementById("preview");

photo.addEventListener("change", function(){
    const file = this.files[0];
    if(file){
        preview.style.display="block";
        preview.src = URL.createObjectURL(file);
    }
});

form.addEventListener("submit", function(e){
    e.preventDefault();

    const formData = new FormData();

    formData.append("name", document.getElementById("name").value);
    formData.append("license", document.getElementById("license").value);
    formData.append("phone", document.getElementById("phone").value);
    formData.append("email", document.getElementById("email").value);
    formData.append("status", document.getElementById("status").value);
    formData.append("photo", document.getElementById("photo").files[0]);
    const types = Array.from(
        document.getElementById("vehicle_type").selectedOptions
    ).map(opt => opt.value);

    formData.append("vehicle_types", JSON.stringify(types));
    fetch("/add_driver/",{
        method:"POST",
        body:formData
    })
    .then(res => res.json())
    .then(data => {

        if(data.status === "success"){
            successMsg.style.display = "block";
            errorMsg.style.display = "none";
            form.reset();
            preview.style.display="none";
        }
        else{
            errorMsg.style.display = "block";
            successMsg.style.display = "none";
        }

    })
    .catch(err=>{
        errorMsg.style.display="block";
        successMsg.style.display="none";
    });

});

</script>

</body>
</html>
