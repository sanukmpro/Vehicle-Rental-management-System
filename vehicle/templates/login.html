<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Vehicle Rental</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Helvetica Neue", Arial, sans-serif;
}

body {
    background: #ffffff;
    color: #111;
}

/* NAVBAR */
nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 22px 60px;
    border-bottom: 1px solid #eee;
}

.logo {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 1px;
}

.nav-links a {
    text-decoration: none;
    color: #111;
    margin-left: 40px;
    font-size: 14px;
    letter-spacing: 0.5px;
    transition: opacity 0.3s ease;
}

.nav-links a:hover {
    opacity: 0.6;
}

/* LOGIN SECTION */
.login-container {
    min-height: 90vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.login-box {
    width: 420px;
}

.login-box h1 {
    font-size: 42px;
    font-weight: 500;
    margin-bottom: 10px;
}

.login-box p {
    font-size: 14px;
    color: #666;
    margin-bottom: 40px;
}

/* FORM */
form {
    display: flex;
    flex-direction: column;
}

input {
    padding: 16px;
    margin-bottom: 20px;
    border: 1px solid #ddd;
    font-size: 14px;
    outline: none;
    transition: border 0.3s ease;
}

input:focus {
    border: 1px solid #000;
}

button {
    padding: 16px;
    background: #111;
    color: #fff;
    border: none;
    font-size: 14px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: background 0.3s ease;
}

button:hover {
    background: #333;
}

.extra {
    margin-top: 20px;
    font-size: 13px;
    text-align: center;
}

.extra a {
    text-decoration: none;
    color: #111;
    font-weight: 500;
}

.extra a:hover {
    text-decoration: underline;
}
</style>
</head>

<body>

<nav>
    <div class="logo">VEHICLE RENTAL</div>
    <div class="nav-links">
        <a href="{% url 'home' %}">Home</a>
        <a href="#">Models</a>
        <a href="#">Contact</a>
    </div>
</nav>

<section class="login-container">
    <div class="login-box">
        <h1>Login</h1>
        <p>Access your account to manage bookings.</p>

        <form method="POST">
            <input type="email" id="email" placeholder="Email Address" required>
            <input type="password" id="password" placeholder="Password" required>
            <label id="err" style="display: none;color: red;">sdffsdfsd</label>
            <button type="submit" id="submit">SIGN IN</button>
        </form>

        <div class="extra">
            Don't have an account? <a href="{% url 'signup' %}">Create one</a>
        </div>
    </div>
</section>
<script>
    const submit = document.getElementById("submit");
    const email = document.getElementById("email");
    const password = document.getElementById("password")
    const err = document.getElementById("err");
    submit.addEventListener("click",(e)=>{
        e.preventDefault();
        fetch("/login/",{
            method:"POST",
            headers:{
                "Content-Type": "application/json",
            },
            body:JSON.stringify({
                email : email.value,
                password : password.value
            })
        }).then(res=>res.json())
        .then(data=>{
            if(data["login_state"]=="login_success"){
                window.location.href = "/"
            }else if(data["login_state"]=="password_wrong"){
                err.innerText = "wrong email or password"
                err.style.display = "block"
            }else if(data["login_state"]=="email_wrong"){
                err.innerText = "user doesn't exist"
                err.style.display = "block"
            }
        })
    })
</script>
</body>
</html>
